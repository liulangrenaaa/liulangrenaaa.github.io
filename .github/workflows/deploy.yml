name: Deploy Hexo Site

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv
          fc-match "Noto Sans CJK SC"

      - name: Resolve Chrome for Mermaid CLI
        run: |
          for candidate in /usr/bin/google-chrome /usr/bin/google-chrome-stable /usr/bin/chromium /usr/bin/chromium-browser; do
            if [ -x "$candidate" ]; then
              echo "MERMAID_CHROME_PATH=$candidate" >> "$GITHUB_ENV"
              echo "PUPPETEER_SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "No Chrome/Chromium executable found on runner." >&2
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Clean cache
        run: npm run clean

      - name: Build site
        run: npm run build

      - name: Publish to master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          touch .nojekyll
          git init
          git checkout -B master
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}" || echo "No changes to commit"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin master
