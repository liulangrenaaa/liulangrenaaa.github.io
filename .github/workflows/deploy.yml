name: Deploy Hexo Site

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve Chrome for Mermaid CLI
        run: |
          for candidate in /usr/bin/google-chrome /usr/bin/google-chrome-stable /usr/bin/chromium /usr/bin/chromium-browser; do
            if [ -x "$candidate" ]; then
              echo "MERMAID_CHROME_PATH=$candidate" >> "$GITHUB_ENV"
              echo "PUPPETEER_SKIP_DOWNLOAD=true" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "No Chrome/Chromium executable found on runner." >&2
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish to master
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: master
          publish_dir: ./public
          force_orphan: true
          enable_jekyll: false
